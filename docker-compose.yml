services:
  chirie:
    build: .
    container_name: chirie
    restart: unless-stopped
    environment:
      APP_NAME: Chirie
      ADMIN_NAME: Apartment Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
      COOKIE_SECURE: "0"
      DATA_DIR: /app/data
      PORT: "8000"
    volumes:
      - chirie-data:/app/data
    ports:
      - "8000:8000"

volumes:
  chirie-data:
